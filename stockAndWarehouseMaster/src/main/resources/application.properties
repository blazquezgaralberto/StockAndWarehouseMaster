# =============================================================================
# application.properties - StockAndWarehouseMaster
# REGLA: Este fichero NUNCA debe contener valores sensibles reales.
#        Todos los secretos se inyectan como variables de entorno.
#        En local, usar un fichero .env (añadido al .gitignore).
# =============================================================================

server.port=8080
spring.application.name=stockAndWarehouseMaster
server.servlet.context-path=/stockAndWarehouseMaster

# =============================================================================
# DATASOURCE
# SECURITY FIX: El fallback ya no contiene una contraseña real.
# Si la variable de entorno no está definida, la app falla al arrancar
# con un error claro, en vez de arrancar con credenciales débiles.
# =============================================================================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Pool de conexiones - importante para producción
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# =============================================================================
# LIQUIBASE
# =============================================================================
spring.liquibase.change-log=classpath:database/db.changelog-master.xml

# =============================================================================
# JWT
# SECURITY FIX 1: Sin valor por defecto - la app no arranca sin el secreto.
# SECURITY FIX 2: La clave debe tener >= 256 bits de entropía.
#   Generar con: openssl rand -base64 32
# SECURITY FIX 3: Reducir expiración a 15 minutos (900000 ms).
#   Implementar refresh tokens para renovación sin re-login.
# =============================================================================
stockAndWarehouseMaster.app.jwtSecret=${JWT_SECRET}
# 15 minutos en vez de 24 horas
stockAndWarehouseMaster.app.jwtExpirationMs=900000
# Refresh token: 7 días (requiere implementación de RefreshTokenService)
stockAndWarehouseMaster.app.jwtRefreshExpirationMs=604800000

# =============================================================================
# MAIL SENDER
# SECURITY FIX: NUNCA incluir credenciales reales en este fichero.
#   El App Password anterior (usmrfsssbwncgcki) debe ser REVOCADO inmediatamente
#   en: myaccount.google.com/apppasswords
#   Generar uno nuevo y configurarlo SOLO como variable de entorno.
# =============================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Timeout para evitar cuelgues en producción
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.connectiontimeout=5000

# =============================================================================
# SUBIDA DE ARCHIVOS
# SECURITY FIX: 100MB es excesivo y puede usarse para ataques DoS.
# Reducir a un límite razonable para el negocio.
# Validar también el tipo MIME en el código (no solo la extensión).
# =============================================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =============================================================================
# MYBATIS
# =============================================================================
mybatis.mapper-locations=classpath:/mappers/*.xml

# =============================================================================
# ACTUATOR - Solo exponer endpoints necesarios, nunca en producción sin auth
# =============================================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# =============================================================================
# LOGGING - No loguear datos sensibles en producción
# =============================================================================
logging.level.root=WARN
logging.level.com.tfgAlberto=INFO
# En desarrollo puedes subir a DEBUG, pero NUNCA en producción
# logging.level.org.springframework.security=DEBUG
