# =============================================================================
# nginx.conf — Frontend Angular
# StockAndWarehouseMaster
# =============================================================================
# Puerto 8080 para correr sin privilegios root

server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ==========================================================================
    # SECURITY HEADERS
    # ==========================================================================
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://stackpath.bootstrapcdn.com https://code.jquery.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://stackpath.bootstrapcdn.com https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self' http://localhost:8080; font-src 'self' data: https://fonts.gstatic.com;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # ==========================================================================
    # ANGULAR ROUTING
    # ==========================================================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==========================================================================
    # CACHÉ DE ASSETS ESTÁTICOS
    # ==========================================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ==========================================================================
    # PROXY AL BACKEND
    #
    # FIX: resolver DNS dinámico de Docker (127.0.0.11).
    # Sin esto, Nginx resuelve "backend" al arrancar. Si el backend no está
    # disponible en ese momento, Nginx falla con "host not found" y muere.
    # Con set $backend_host, la resolución ocurre en cada petición.
    # ==========================================================================
    resolver 127.0.0.11 valid=30s ipv6=off;

    location /stockAndWarehouseMaster/ {
        set $backend_host backend;
        proxy_pass http://$backend_host:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    server_tokens off;

    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
