# =============================================================================
# nginx.conf — Frontend Angular
# StockAndWarehouseMaster
# =============================================================================
# Puerto 8080 para correr sin privilegios root

server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ==========================================================================
    # SECURITY HEADERS
    # Estas cabeceras se envían en TODAS las respuestas.
    # Protegen al navegador del usuario contra los ataques más comunes.
    # ==========================================================================

    # Evita que la app se cargue dentro de un iframe (anti-clickjacking)
    add_header X-Frame-Options "DENY" always;

    # Evita que el navegador "adivine" el tipo de contenido de la respuesta
    # Previene ataques de MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Activa el filtro XSS del navegador (legacy, pero por compatibilidad)
    add_header X-XSS-Protection "1; mode=block" always;

    # Content Security Policy: define exactamente qué recursos puede cargar el navegador
    # default-src 'self': solo recursos del mismo origen
    # script-src 'self': solo scripts del mismo origen (sin inline scripts)
    # style-src 'self' 'unsafe-inline': permite estilos inline (necesario para Angular)
    # img-src 'self' data:: permite imágenes del origen y data URIs (Angular las usa)
    # connect-src 'self': las llamadas fetch/XHR solo al mismo origen
    # AJUSTAR: añadir el dominio del backend si es diferente al del frontend
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://localhost:8080; font-src 'self';" always;

    # Política de referrer: no enviar la URL completa al hacer click en enlaces externos
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy: deshabilitar APIs del navegador que la app no necesita
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # HSTS: fuerza HTTPS (activar solo cuando tengas certificado TLS configurado)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ==========================================================================
    # ANGULAR ROUTING
    # Angular es una SPA (Single Page Application). Todas las rutas deben
    # redirigirse a index.html para que Angular gestione el routing.
    # Sin esto, un refresh en /productos devuelve 404.
    # ==========================================================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==========================================================================
    # CACHÉ DE ASSETS ESTÁTICOS
    # Los ficheros compilados de Angular tienen hash en el nombre (main.abc123.js).
    # Son inmutables: si el contenido cambia, el nombre cambia.
    # Podemos cachearlos agresivamente en el navegador.
    # ==========================================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Mantener los security headers también en assets
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ==========================================================================
    # PROXY AL BACKEND
    # Las llamadas a /stockAndWarehouseMaster/** se redirigen al backend.
    # Esto evita problemas de CORS: el navegador ve todo desde el mismo origen.
    # ==========================================================================
    location /stockAndWarehouseMaster/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts para evitar cuelgues
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ==========================================================================
    # OCULTAR VERSIÓN DE NGINX
    # No exponer información de la versión en cabeceras ni páginas de error
    # ==========================================================================
    server_tokens off;

    # Página de error personalizada (no exponer stack traces)
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
